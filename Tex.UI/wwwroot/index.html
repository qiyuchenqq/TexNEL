<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TexNEL</title>
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="css/hidden.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/sidebar.css" />
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/overview.css" />
    <link rel="stylesheet" href="css/network.css" />
    <link rel="stylesheet" href="css/session.css" />
    <link rel="stylesheet" href="css/plugins.css" />
    <link rel="stylesheet" href="css/settings.css" />
    <link rel="stylesheet" href="css/about.css" />
    <link rel="stylesheet" href="css/skin.css" />
    <link rel="stylesheet" href="css/account.css" />
    <link rel="stylesheet" href="css/dialog.css" />
    <link rel="stylesheet" href="css/splash.css" />
    <link rel="stylesheet" href="css/toast.css" />
    <link rel="stylesheet" href="css/context-menu.css" />
</head>
<body>
    <div id="app">
        <header id="titlebar">
            <div class="titlebar-drag">
                <div class="titlebar-left">
                    <img src="assets/Tex.png" alt="" class="titlebar-logo" onerror="this.style.display='none'" />
                    <span class="titlebar-title">TexNEL</span>
                </div>
            </div>
            <div class="titlebar-controls">
                <button class="tb-btn tb-close" id="btn-close" title="关闭">
                    <svg class="tb-icon" width="8" height="8" viewBox="0 0 8 8"><line x1="1" y1="1" x2="7" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><line x1="7" y1="1" x2="1" y2="7" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
                </button>
                <button class="tb-btn tb-minimize" id="btn-minimize" title="最小化">
                    <svg class="tb-icon" width="8" height="2" viewBox="0 0 8 2"><rect width="8" height="1.5" rx="0.75" fill="currentColor"/></svg>
                </button>
            </div>
        </header>

        <div class="app-body">
            <nav id="sidebar" class="sidebar hidden"></nav>

            <main id="content"></main>
        </div>

        <div id="splash-overlay">
            <div class="splash-content">
                <div class="splash-images-container">
                    <div class="splash-text-container">
                        <h1 class="splash-title">TexNEL</h1>
                        <p class="splash-subtitle">正在启动</p>
                    </div>
                </div>
                <div class="splash-spinner"></div>
            </div>
        </div>

        <div id="toast-container"></div>
    </div>

    <script src="js/context-menu.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/splash.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/overview.js"></script>
    <script src="js/custom-select.js"></script>
    <script src="js/add-role.js"></script>
    <script src="js/server-detail.js"></script>
    <script src="js/network.js"></script>
    <script src="js/rental.js"></script>
    <script src="js/session.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/skin.js"></script>
    <script src="js/account.js"></script>
    <script src="js/settings.js"></script>
    <script src="js/about.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
